# AI ERP Operating Advisor - Nginx reverse proxy template
# Replace server_name and paths before production use.

limit_req_zone $binary_remote_addr zone=ai_erp_api:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=ai_erp_conn:10m;

server {
    listen 80;
    server_name example.com;

    client_max_body_size 50m;
    keepalive_timeout 65;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Frontend static files. Point this to the deployed web_demo or built frontend directory.
    root /opt/ai-ecommerce-assistant/web_demo;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        limit_req zone=ai_erp_api burst=30 nodelay;
        limit_conn ai_erp_conn 30;

        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:8000/api/health;
    }
}

# HTTPS production note:
# 1. Use Certbot or cloud certificate service.
# 2. Redirect HTTP to HTTPS after certificate installation.
# 3. Mirror CSP / HSTS only after domain and HTTPS are stable.
