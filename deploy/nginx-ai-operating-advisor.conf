# Recommended Nginx reverse proxy config
#
# Security model:
#   Public internet -> 80/443 -> Nginx -> 127.0.0.1:3000 -> FastAPI
#
# Do not open port 3000 to 0.0.0.0/0 in the cloud security group.
# Replace server_name with your domain or server IP.

server {
    listen 80;
    server_name 47.118.29.46;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
