name: 强付费放量
about: 第一次输入后直接生成放量条件、预算节奏、素材方向和停投建议。
title: "[强付费] "
labels: ["强付费"]
body:
  - type: textarea
    id: input
    attributes:
      label: 强付费轻输入
      description: 可以只填少量信息，系统会先生成第一版结果；预算、售价、成本、库存、点击/转化/ROI/退款越详细，输出越清晰。
      value: |
        商品一句话：
        预算范围：
        售价/成本/物流：
        库存：
        当前数据：点击/转化/ROI/退款
        当前问题：
        可选补充：素材情况、竞品价格、活动计划、期望放量周期
    validations:
      required: true
