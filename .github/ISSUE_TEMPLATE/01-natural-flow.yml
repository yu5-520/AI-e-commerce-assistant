name: 自然流测试
about: 第一次输入后直接生成标题、主图、价格和基础流通性执行包。
title: "[自然流] "
labels: ["自然流"]
body:
  - type: textarea
    id: input
    attributes:
      label: 自然流轻输入
      description: 可以只填少量信息，系统会先生成第一版结果；商品卖点、竞品价格、库存、运费、当前数据越详细，输出越清晰。
      value: |
        商品一句话：
        当前问题：
        想测试：标题 / 主图 / 价格 / SKU / 竞品
        可选补充：成本、售价、运费、库存、商品卖点、竞品价格、曝光/点击/成交
    validations:
      required: true
