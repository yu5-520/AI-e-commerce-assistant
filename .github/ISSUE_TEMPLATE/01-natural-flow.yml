    id: core
    attributes:
      label: 最少输入
      description: 只写商品和当前问题，不需要完整上架资料。
      value: |
        商品一句话：
        当前问题：
        想测试方向：标题 / 主图 / 价格 / SKU / 竞品
    validations:
      required: true
  - type: textarea
    id: optional
    attributes:
      label: 可选补充
      description: 有就填，没有可以