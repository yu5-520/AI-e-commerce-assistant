name: PDD Operation Analysis
description: Create a PDD product operation analysis request.
title: "[运营分析] "
labels: ["运营分析"]
body:
  - type: textarea
    id: product_info
    attributes:
      label: 商品运营输入
      description: 填写商品信息后提交 Issue，GitHub Actions 会自动输出分析评论。
      value: |
        商品名称：
        商品类目：
        成本价：
        售价：
        物流成本：
        库存：
        SKU：
        商品卖点：
        竞品信息：
        运营目标：自然流裂变 / 爆品生命周期 / 强付费放量 / 合规风控
        当前数据：曝光、点击、成交、推广花费、ROI、退款
    validations:
      required: true
