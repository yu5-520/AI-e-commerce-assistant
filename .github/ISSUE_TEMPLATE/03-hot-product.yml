name: 爆品打造
about: 第一次输入后直接生成爆品结构拆解、流通性测试、承接路线和风险建议。
title: "[爆品] "
labels: ["爆品"]
body:
  - type: textarea
    id: input
    attributes:
      label: 爆品打造轻输入
      description: 可以只填少量信息，系统会先生成第一版结果；自家商品、参考爆品、目标路线、备货能力、当前数据越详细，输出越清晰。
      value: |
        自家商品：
        参考爆品/竞品：
        想走路线：低价承接 / 差异化升级 / 细分人群
        备货能力：
        当前数据：
        目标：
        可选补充：成本、售价、库存、主图素材、竞品价格、活动计划
    validations:
      required: true
