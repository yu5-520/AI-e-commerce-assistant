name: Runtime Smoke Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime dependencies
        run: pip install -r requirements.txt
      - name: Python syntax check
        run: python -m py_compile src/run_demo.py src/api/main.py evals/run_evals.py scripts/smoke_test_runtime.py
      - name: Unified workflow smoke test
        run: python scripts/smoke_test_runtime.py
      - name: Minimal evals
        run: python evals/run_evals.py
