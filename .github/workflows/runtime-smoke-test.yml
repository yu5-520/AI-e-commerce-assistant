name: Runtime Smoke Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check
        run: python -m py_compile src/api/main.py scripts/check_version_governance.py scripts/check_repository_consistency.py scripts/check_backend_flow_consistency.py scripts/smoke_test_runtime.py scripts/smoke_test_api.py

      - name: Version governance check
        run: python scripts/check_version_governance.py

      - name: Repository consistency check
        run: python scripts/check_repository_consistency.py

      - name: Backend flow consistency check
        run: python scripts/check_backend_flow_consistency.py

      - name: Runtime workflow smoke test
        run: python scripts/smoke_test_runtime.py

      - name: Product API smoke test
        run: python scripts/smoke_test_api.py
