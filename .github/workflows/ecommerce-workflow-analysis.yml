name: E-commerce Workflow Analysis

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  analyze:
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime dependencies
        run: pip install -r requirements.txt
      - name: Generate workflow analysis card
        run: python scripts/ecommerce_workflow_analyzer.py result.md
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
      - name: Comment analysis result
        run: gh issue comment ${{ github.event.issue.number }} --body-file result.md
        env:
          GH_TOKEN: ${{ github.token }}
