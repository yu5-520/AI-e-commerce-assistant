name: PDD Operation Analysis

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write

jobs:
  analyze:
    if: startsWith(github.event.issue.title, '[运营分析]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save issue body
        run: |
          cat > issue_body.md <<'EOF'
          ${{ github.event.issue.body }}
          EOF

      - name: Run analyzer
        run: python scripts