name: PDD Analysis
on:
  issues:
    types: [opened, edited]
permissions:
  contents: read
  issues: write
jobs:
  run:
    if: startsWith(github.event.issue.title, '[自然流]') || startsWith(github.event.issue.title, '[强付费]') || startsWith(github.event.issue.title, '[爆品]')
    runs-on: ubuntu-latest
    env:
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}
    steps:
      - uses: actions