name: PDD
on:
  issues:
    types: [opened, edited]
permissions:
  contents: read
  issues: write
jobs:
  x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python scripts/pdd_operation_analyzer.py result.md
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
      - run: gh issue comment ${{ github.event.issue.number }} --body-file result.md
        env: {GH_TOKEN: "${{ github.token }}"}
