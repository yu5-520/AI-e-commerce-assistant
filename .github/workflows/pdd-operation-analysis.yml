name: PDD Analysis
on:
  issues:
    types: [opened, edited]
permissions:
  contents: read
  issues: write
jobs:
  run:
    if: startsWith(github.event.issue.title, '[运营分析]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python scripts/pdd_operation_analyzer.py result.md
      - run: gh issue comment ${{ github.event.issue.number }} --body-file result.md
        env:
          GH_TOKEN: ${{ github.token }}
