<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 电商经营工作台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">AI</span>
          <div>
            <strong>经营工作台</strong>
            <small>Workflow-first</small>
          </div>
        </div>

        <nav class="nav" aria-label="产品导航">
          <a href="#dashboard" data-route="dashboard" class="active">经营总览</a>
          <a href="#data-import" data-route="data-import">数据导入</a>
          <a href="#diagnosis" data-route="diagnosis">AI 诊断</a>
          <a href="#tasks" data-route="tasks">任务中心</a>
          <a href="#approvals" data-route="approvals">审批中心</a>
          <a href="#reports" data-route="reports">报告中心</a>
          <a href="#knowledge" data-route="knowledge">知识库</a>
        </nav>

        <div class="sidebar-note">
          <strong>安全边界</strong>
          <p>不接真实店铺，不自动改价，不自动群发，不自动退款。</p>
        </div>
      </aside>

      <div class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">AI + RPA + ERP + CRM</p>
            <h1 id="pageTitle">经营总览</h1>
            <p id="pageSubtitle">从经营数据进入系统，到诊断、任务、审批、报告的产品闭环。</p>
          </div>
          <div class="topbar-actions">
            <button id="refreshBtn">刷新工作流</button>
            <span id="apiModeBadge" class="mode-badge">检测 API...</span>
          </div>
        </header>

        <main id="appView" class="view"></main>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
