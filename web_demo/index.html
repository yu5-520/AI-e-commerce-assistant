<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 经营参谋</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./data-import.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">参</span>
          <div>
            <strong>AI 经营参谋</strong>
            <small>每日看生意，少踩坑</small>
          </div>
        </div>

        <nav class="nav" aria-label="产品导航">
          <a href="#dashboard" data-route="dashboard" class="active">今日总览</a>
          <a href="#operating-unit" data-route="operating-unit">经营单元</a>
          <a href="#data-check" data-route="data-check">数据体检</a>
          <a href="#products" data-route="products">商品体检</a>
          <a href="#competitors" data-route="competitors">竞品机会</a>
          <a href="#listing" data-route="listing">上新建议</a>
          <a href="#traffic" data-route="traffic">流量复盘</a>
          <a href="#approvals" data-route="approvals">待确认动作</a>
          <a href="#reports" data-route="reports">经营报告</a>
        </nav>

        <div class="sidebar-note">
          <strong>放心使用</strong>
          <p>只给建议和草案；上架、改价、投放、客户触达都需要你确认。</p>
        </div>
      </aside>

      <div class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">ERP 经营单元循环</p>
            <h1 id="pageTitle">今日总览</h1>
            <p id="pageSubtitle">从店铺数据里识别当前生意类型，生成今天该看的问题、机会和待确认动作。</p>
          </div>
          <div class="topbar-actions">
            <button id="refreshBtn">重新生成经营建议</button>
            <span id="apiModeBadge" class="mode-badge">准备读取数据...</span>
          </div>
        </header>

        <main id="appView" class="view"></main>
      </div>
    </div>

    <script src="./app-v2.js"></script>
  </body>
</html>
